name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Check, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NODE_ENV: test
      JWT_SECRET: test-secret-with-at-least-32-characters
      LOG_LEVEL: error
      DATABASE_PATH: /tmp/cenastudio-ci.db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npm run check

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build
